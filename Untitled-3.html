<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasty Hub</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .logo-container {
            text-align: center;
        }

        .logo {
            font-size: 72px;
            font-family: 'Arial Black', sans-serif;
            color: #fff;
            text-shadow: 0 0 10px #ff0080,
                         0 0 20px #ff0080,
                         0 0 30px #ff0080,
                         0 0 40px #ff0080;
            opacity: 0;
            transform: scale(0);
            max-width: 300px; /* Adjust based on your logo size */
        }

        #slogan {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #4CAF50, 0 0 20px #4CAF50, 0 0 30px #4CAF50, 0 0 40px #4CAF50;
            position: relative;
            display: inline-block;
            opacity: 0;
            margin-top: 20px;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 10px #4CAF50, 0 0 20px #4CAF50; }
            50% { text-shadow: 0 0 20px #4CAF50, 0 0 30px #4CAF50, 0 0 40px #4CAF50; }
            100% { text-shadow: 0 0 10px #4CAF50, 0 0 20px #4CAF50; }
        }

        #next-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
        }

        #next-button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="./Images/Tasty.png" alt="Tasty Hub Logo" class="logo">
        <div id="slogan">Tasty Hub</div>
    </div>
    <button id="next-button">Continue</button>

    <!-- GSAP Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    
    <script>
        gsap.registerPlugin(TextPlugin);
        
        const timeline = gsap.timeline();

        // Start animation sequence
        timeline
            .to(".logo", {
                opacity: 1,
                scale: 1,
                duration: 1.5,
                ease: "elastic.out(1, 0.5)"
            })
            .to(".logo", {
                filter: "drop-shadow(0 0 20px #ff0080) drop-shadow(0 0 30px #ff0080)",
                duration: 0.5,
                yoyo: true,
                repeat: -1
            })
            .to("#slogan", {
                opacity: 1,
                duration: 1,
                ease: "power2.inOut"
            })
            .from("#slogan", {
                text: "",
                duration: 1.5,
                ease: "none"
            })
            .to("#slogan", {
                duration: 1,
                css: {
                    animation: "glow 2s ease-in-out infinite"
                }
            })
            .to("#slogan", {
                text: "A Central Hub for All Tasty Things!",
                duration: 3,
                ease: "power1.inOut",
                delay: 1
            })
            .to("#next-button", {
                opacity: 1,
                y: 0,
                duration: 0.5,
                ease: "power2.out"
            });

        // Add click event for the next button
        document.getElementById('next-button').addEventListener('click', () => {
            window.location.href = 'Recipe-Recommendation\Login\login.html';
        });
    </script>
</body>
</html>
