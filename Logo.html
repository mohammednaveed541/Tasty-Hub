<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasty Hub Logo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .logo-container {
            text-align: center;
        }

        .logo {
            font-size: 72px;
            font-family: 'Arial Black', sans-serif;
            color: #fff;
            text-shadow: 0 0 10px #ff0080,
                         0 0 20px #ff0080,
                         0 0 30px #ff0080,
                         0 0 40px #ff0080;
            opacity: 0;
        }

        .slogan {
            font-size: 24px;
            font-family: Arial, sans-serif;
            color: #fff;
            margin-top: 20px;
            opacity: 0;
            text-shadow: 0 0 5px #4CAF50,
                         0 0 10px #4CAF50,
                         0 0 15px #4CAF50,
                         0 0 20px #4CAF50;
        }

        #next-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            opacity: 0;
        }

        #next-button:hover {
            background-color: #45a049;
        }

        .tasty-hub-text {
            font-size: 32px;
            font-family: Arial, sans-serif;
            color: #fff;
            margin: 20px 0;
            opacity: 0;
            font-weight: bold;
            text-shadow: 0 0 10px #4CAF50, 
                         0 0 20px #4CAF50, 
                         0 0 30px #4CAF50, 
                         0 0 40px #4CAF50;
            position: relative;
            display: inline-block;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 10px #4CAF50, 0 0 20px #4CAF50; }
            50% { text-shadow: 0 0 20px #4CAF50, 0 0 30px #4CAF50, 0 0 40px #4CAF50; }
            100% { text-shadow: 0 0 10px #4CAF50, 0 0 20px #4CAF50; }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="logo">TASTY HUB</div>
        <div class="slogan">A Central Hub for All Tasty Things</div>
    </div>
    <button id="next-button">Continue</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        gsap.registerPlugin(gsap.plugins.TextPlugin);
        
        const timeline = gsap.timeline();

        // Logo animation
        timeline
            .to(".logo", {
                opacity: 1,
                scale: 1,
                duration: 1.5,
                ease: "elastic.out(1, 0.5)"
            })
            .to(".logo", {
                filter: "drop-shadow(0 0 20px #ff0080) drop-shadow(0 0 30px #ff0080)",
                duration: 0.5,
                yoyo: true,
                repeat: -1
            })
            // New Tasty Hub text animation
            .to(".tasty-hub-text", {
                opacity: 1,
                duration: 0.5
            })
            .from(".tasty-hub-text", {
                text: "",
                duration: 1.5,
                ease: "none"
            })
            .to(".tasty-hub-text", {
                duration: 1,
                css: {
                    animation: "glow 2s ease-in-out infinite"
                }
            })
            .to(".slogan", {
                opacity: 1,
                duration: 1,
                ease: "power2.inOut",
                y: 0
            }, "-=0.5")
            .to(".slogan", {
                textShadow: "0 0 10px #4CAF50, 0 0 20px #4CAF50, 0 0 30px #4CAF50, 0 0 40px #4CAF50",
                duration: 1,
                yoyo: true,
                repeat: -1
            })
            .to("#next-button", {
                opacity: 1,
                y: 0,
                duration: 0.5,
                ease: "power2.out"
            });

        document.getElementById('next-button').addEventListener('click', () => {
            window.location.href = 'dumbopen.html';
        });
    </script>
</body>
</html>
